repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff-check (manual)
        args: [check]
        stages: [manual]
      - id: ruff
        name: ruff-strict-fix (commit)
        args: [check, --fix, --unsafe-fixes]
        stages: [commit]
      - id: ruff-format
        stages: [commit]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        stages: [commit]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        stages: [commit]
      - id: check-merge-conflict
        stages: [manual, commit]
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (manual)
        entry: npx -y markdownlint-cli2
        language: system
        types_or: [markdown]
        pass_filenames: true
        stages: [manual]
      - id: markdownlint-cli2-fix
        name: markdownlint-cli2-fix (commit)
        entry: npx -y markdownlint-cli2 --fix
        language: system
        types_or: [markdown]
        pass_filenames: true
        stages: [commit]
