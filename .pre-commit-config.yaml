repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Strict autofix: enable broader rules and unsafe fixes on dev machines
      - id: ruff
        name: ruff-fix-strict
        args: [
          --fix,
          --unsafe-fixes,
          --select,
          E,F,I,UP,B,SIM,RUF,PLC,PLE
        ]
      # Formatting pass (idempotent)
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx -y markdownlint-cli2
        language: system
        types_or: [markdown]
        pass_filenames: true
      - id: markdownlint-cli2-fix
        name: markdownlint-cli2-fix
        entry: npx -y --package markdownlint-cli2 markdownlint-cli2-fix
        language: system
        types_or: [markdown]
        pass_filenames: true
