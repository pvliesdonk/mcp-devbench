[project]
name = "mcp-devbench"
version = "0.0.1"
description = "MCP Devbench (M0 scaffolding on FastMCP2 only)"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.9.0",
  "pydantic-settings>=2.5.2",
  "python-dotenv>=1.0.1",
  "docker>=7.0.0",
  "fastmcp>=2.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
  "pytest-mock>=3.14.0",
  "ruff>=0.6.9",
  "pyright>=1.1.387",
  "pre-commit>=4.0.1",
]

[tool.uv]
# defaults

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
