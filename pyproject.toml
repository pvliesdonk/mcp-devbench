[project]
name = "mcp-devbench"
version = "0.0.0"
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "fastmcp2>=0.1.0"
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "pyright",
    "pre-commit",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.ruff]
line-length = 100
select = [
    "E", "F", "I", "UP", "B", "SIM", "RUF", "PLC", "PLE",
]
ignore = []
exclude = [".venv", ".git", "dist", "build"]

[tool.ruff.format]
quote-style = "double"

[tool.ruff.isort]
known-first-party = ["mcp_devbench"]
profile = "black"
